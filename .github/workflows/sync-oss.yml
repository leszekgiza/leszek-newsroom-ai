name: Sync OSS to Public Repo
on:
  push:
    branches: [master]

jobs:
  verify-oss:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run test:oss
      - name: Lint (non-blocking until codebase is clean)
        run: npm run lint
        continue-on-error: true

  sync:
    needs: verify-oss
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Remove premium code
        run: |
          rm -rf src/premium/
          rm -rf docs/premium/
          rm -rf packages/premium/
          rm -rf e2e/premium/
          rm -f .env.premium.example
          rm -f .github/workflows/sync-oss.yml
      - name: Push to public repo
        env:
          SSH_DEPLOY_KEY: ${{ secrets.PUBLIC_REPO_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          git diff-index --quiet HEAD || git commit -m "sync: ${{ github.event.head_commit.message }}"

          git remote add public git@github.com:leszekgiza/leszek-newsroom-ai.git
          git push --force public master
